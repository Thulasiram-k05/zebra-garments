<!DOCTYPE html>
<html lang="en">

<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Product Admin Panel</h1>

    <!-- FORM -->
    <div class="form">
        <input type="hidden" id="product_id">

        <input type="text" id="company_name" placeholder="Company Name">
        <input type="text" id="cloth" placeholder="Cloth">

        <select id="gender">
            <option>Men</option>
            <option>Women</option>
            <option>Kids</option>
        </select>

        <select id="category">
            <option>Regular Fit T-Shirt</option>
            <option>Track Pants</option>
            <option>Shorts</option>
            <option>Jacket</option>
            <option>Oversized T-Shirt</option>
            <option>Printed T-Shirt</option>
            <option>Cargo Track Pants</option>
            <option>Dry-Fit Track Pants</option>
        </select>

        <input type="text" id="size" placeholder="Size">
        <input type="number" id="price" placeholder="Price">
        <input type="number" id="old_price" placeholder="Old Price">

        <!-- IMAGE URL -->
        <input type="text" id="image" placeholder="Image URL">

        <input type="text" id="description" placeholder="Description">

        <button onclick="saveProduct()">Save Product</button>
    </div>

    <!-- TABLE -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Company</th>
                <th>Cloth</th>
                <th>Gender</th>
                <th>Category</th>
                <th>Price</th>
                <th>Image</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="productTable"></tbody>
    </table>

    <script src="script.js"></script>
</body>

</html>
